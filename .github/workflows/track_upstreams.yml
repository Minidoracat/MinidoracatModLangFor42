# 雙上游追蹤器（PZ B42 如一模組翻譯繁中版）
# 排程：每日 04:17 UTC（台灣 12:17）；手動 Run workflow 預設 dry_run=true 走 preview。
#
# 流程：check（查時間戳，無寫權限）→ diff（steamcmd 下載+裁剪+diff，無 GitHub 寫權限）
#       → issue（冪等開/更 issue + commit 成功子集 state，issues:write + contents:write）。
# 三 job 以 artifact 傳遞「標準化 diff」，permission 逐 job 最小化。
# dry_run（預設 true）走輕量 preview job：只查 API 印計畫，零 issue 零 commit。
#
# ⚠️ GitHub Actions 對 60 天無活動的 repo 會自動停用排程工作流。
#    無上游變更即無 state commit，故不能靠本工作流自身當「活動」來源。
#    停用後 re-enable 步驟：
#      1) repo → Actions 分頁 → 若見「workflows disabled」橫幅 → 點 "Enable"。
#      2) 或 gh CLI：gh workflow enable track_upstreams.yml
#      3) 之後手動 Run workflow（dry_run=false）跑一次確認恢復。
#    （是否加 heartbeat 排程 commit 留給使用者決定，預設不加。）

name: track-upstreams

on:
  schedule:
    # 每日 04:17 UTC 跑一次（真實增量；check 僅 ~26 個 API 請求，公開 repo 分鐘數免費）
    - cron: "17 4 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "只查 API 印計畫，不下載/不開 issue/不 commit"
        type: boolean
        default: true

# 全域預設零權限；各 job 再逐一最小授權
permissions: {}

# 跨 cron 併發：同群組排隊、不取消進行中（state commit 交易不可被腰斬）
concurrency:
  group: track-upstreams
  cancel-in-progress: false

jobs:
  # ---- 輕量預覽（workflow_dispatch 且 dry_run=true）：零 issue 零 commit ----
  preview:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.repository.default_branch }} # 釘定 default branch，避免非預期 ref
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
      - name: dry-run（查時間戳 + 印計畫）
        env:
          STEAM_API_KEY: ${{ secrets.STEAM_API_KEY }} # 選項、非必需；免 key 為主
        run: uv run scripts/tracker.py run --dry-run

  # ---- check：查 API 時間戳 → changed artifact（無 GitHub 寫、無下載） ----
  check:
    if: ${{ github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && !inputs.dry_run) }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.repository.default_branch }} # 釘定 default branch，避免非預期 ref
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
      - name: 查時間戳
        env:
          STEAM_API_KEY: ${{ secrets.STEAM_API_KEY }}
        run: uv run scripts/tracker.py check --out changed.json
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: tracker-changed
          path: changed.json
          retention-days: 3

  # ---- diff：steamcmd 下載+裁剪+抽取+diff → diffs artifact（無 GitHub 寫、無 Steam secret） ----
  diff:
    needs: check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.repository.default_branch }} # 釘定 default branch，避免非預期 ref
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
      # 第三方 action pin 完整 commit SHA
      - id: steamcmd
        uses: CyberAndrii/setup-steamcmd@afc45f145b95c175c3a3862d3ca84756537d48e8 # v1.3.0
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: tracker-changed
      - name: 下載+裁剪+diff（Workshop 內容只靜態解析、絕不執行）
        run: >-
          uv run scripts/tracker.py diff
          --in changed.json
          --out diffs.json
          --steamcmd "${{ steps.steamcmd.outputs.executable }}"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: tracker-diffs
          path: diffs.json
          retention-days: 3

  # ---- issue：冪等開/更 issue + commit 成功子集 state（issues:write + contents:write；不碰 Steam secret） ----
  issue:
    needs: diff
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.repository.default_branch }} # 釘定 default branch，避免非預期 ref
          fetch-depth: 0 # rebase onto origin 需完整歷史
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: tracker-diffs
      - name: 設定 git 身分
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
      - name: 冪等開/更 issue + commit state
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TRACKER_BRANCH: ${{ github.event.repository.default_branch }}
          TRACKER_CI: "1" # CI 缺 baseline fail-fast 開關（見 tracker.py ci_baseline_guard）
        run: uv run scripts/tracker.py issue --in diffs.json
